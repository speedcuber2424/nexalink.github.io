const MiniChart=({data,color,height=50,label})=>{
  if(!data||data.length<2)return null;
  const vals=data.map(d=>d.v), min=Math.min(...vals), max=Math.max(...vals), range=max-min||1;
  const w=280,h=height;
  const pts=data.map((d,i)=>{const x=(i/(data.length-1))*w;const y=h-((d.v-min)/range)*(h-8)-4;return`${x},${y}`;});
  return(<svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{display:'block'}}>
    <defs><linearGradient id={`g${label}`} x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor={color} stopOpacity="0.2"/><stop offset="100%" stopColor={color} stopOpacity="0"/>
    </linearGradient></defs>
    <path d={`M${pts[0]} L${pts.join(' L')} L${w},${h} L0,${h} Z`} fill={`url(#g${label})`}/>
    <path d={`M${pts.join(' L')}`} fill="none" stroke={color} strokeWidth="1.5"/>
  </svg>);
};

const genChart=(base,noise,n=24)=>Array.from({length:n},(_,i)=>{
  const t=new Date(Date.now()-(n-1-i)*30000);
  return{t:`${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`,v:+(base+(Math.random()-0.5)*noise*2).toFixed(1)};
});

// ── useMQTT ───────────────────────────────────────────────────────────────────
const useMQTT=()=>{
  const [connState,setConnState]=useState('disconnected');
  const [lastError,setLastError]=useState('');
  const [messages,setMessages]=useState([]);
  const clientRef=useRef(null);
  const addMsg=useCallback(msg=>setMessages(p=>[...p.slice(-199),{...msg,time:new Date().toTimeString().slice(0,8)}]),[]);
  const connect=useCallback(cfg=>{
    if(clientRef.current){try{clientRef.current.end(true);}catch{}clientRef.current=null;}
    setConnState('connecting');setLastError('');
    addMsg({type:'info',text:`Connecting to ${cfg.broker}:${cfg.port}…`});
    const url=`${cfg.useSSL?'wss':'ws'}://${cfg.broker}:${cfg.port}/mqtt`;
    const opts={clientId:cfg.clientId||'nexalink_'+Math.random().toString(36).slice(2,9),clean:true,connectTimeout:8000,reconnectPeriod:0};
    if(cfg.username)opts.username=cfg.username;
    if(cfg.password)opts.password=cfg.password;
    let client;
    try{client=mqtt.connect(url,opts);}catch(e){setConnState('error');setLastError(String(e));addMsg({type:'error',text:`Failed: ${e}`});return;}
    client.on('connect',()=>{setConnState('connected');addMsg({type:'success',text:`✓ Connected as ${opts.clientId}`});if(cfg.topic)client.subscribe(cfg.topic+'/#',()=>{});});
    client.on('message',(topic,payload)=>addMsg({type:'rx',text:`← [${topic}] ${payload.toString()}`}));
    client.on('error',err=>{setConnState('error');setLastError(String(err));addMsg({type:'error',text:`Error: ${err.message||err}`});});
    client.on('close',()=>{setConnState('disconnected');addMsg({type:'info',text:'Disconnected.'});});
    clientRef.current=client;
  },[addMsg]);
  const disconnect=useCallback(()=>{if(clientRef.current){clientRef.current.end();clientRef.current=null;}setConnState('disconnected');},[]);
  const publish=useCallback((topic,payload)=>{
    if(!clientRef.current||connState!=='connected')return false;
    clientRef.current.publish(topic,String(payload));
    addMsg({type:'tx',text:`→ [${topic}] ${payload}`});return true;
  },[connState,addMsg]);
  useEffect(()=>()=>{if(clientRef.current)clientRef.current.end(true);},[]);
  return{connState,lastError,messages,connect,disconnect,publish,addMsg};
};

function TweaksPanel({title='Tweaks',children}){
  const[open,setOpen]=useState(false);const dragRef=useRef(null);const offRef=useRef({x:16,y:16});
  const clamp=useCallback(()=>{const p=dragRef.current;if(!p)return;const maxR=Math.max(16,window.innerWidth-p.offsetWidth-16);const maxB=Math.max(16,window.innerHeight-p.offsetHeight-16);offRef.current={x:Math.min(maxR,Math.max(16,offRef.current.x)),y:Math.min(maxB,Math.max(16,offRef.current.y))};p.style.right=offRef.current.x+'px';p.style.bottom=offRef.current.y+'px';},[]);
  useEffect(()=>{if(!open)return;clamp();window.addEventListener('resize',clamp);return()=>window.removeEventListener('resize',clamp);},[open,clamp]);
  useEffect(()=>{const h=e=>{const t=e?.data?.type;if(t==='__activate_edit_mode')setOpen(true);else if(t==='__deactivate_edit_mode')setOpen(false);};window.addEventListener('message',h);window.parent.postMessage({type:'__edit_mode_available'},'*');return()=>window.removeEventListener('message',h);},[]);
  const dismiss=()=>{setOpen(false);window.parent.postMessage({type:'__edit_mode_dismissed'},'*');};
  const onDrag=e=>{const p=dragRef.current;if(!p)return;const r=p.getBoundingClientRect(),sx=e.clientX,sy=e.clientY,sr=window.innerWidth-r.right,sb=window.innerHeight-r.bottom;const mv=ev=>{offRef.current={x:sr-(ev.clientX-sx),y:sb-(ev.clientY-sy)};clamp();};const up=()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);};
  if(!open)return null;
  return(<><style>{__TS}</style><div ref={dragRef} className="twk-panel" style={{right:offRef.current.x,bottom:offRef.current.y}}><div className="twk-hd" onMouseDown={onDrag}><b>{title}</b><button className="twk-x" onMouseDown={e=>e.stopPropagation()} onClick={dismiss}>✕</button></div><div className="twk-body">{children}</div></div></>);
}
function TweakSection({label,children}){return(<><div className="twk-sect">{label}</div>{children}</>);}
function TweakSlider({label,value,min=0,max=100,step=1,unit='',onChange}){return(<div className="twk-row"><div className="twk-lbl"><span>{label}</span><span style={{color:'rgba(41,38,27,.5)'}}>{value}{unit}</span></div><input type="range" className="twk-slider" min={min} max={max} step={step} value={value} onChange={e=>onChange(Number(e.target.value))}/></div>);}
function TweakToggle({label,value,onChange}){return(<div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><button type="button" className="twk-toggle" data-on={value?'1':'0'} onClick={()=>onChange(!value)}><i/></button></div>);}
function TweakColor({label,value,onChange}){return(<div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><input type="color" className="twk-swatch" value={value} onChange={e=>onChange(e.target.value)}/></div>);}

// ── ROBOT CONTROL PANEL ───────────────────────────────────────────────────────
const RobotControlPanel=({theme:t,mqtt:mq,conn,cmds,setCmds})=>{
  const[editMode,setEditMode]=useState(false);
  const[editCmd,setEditCmd]=useState(null);
  const[lastSent,setLastSent]=useState(null);
  const connected=mq.connState==='connected';

  const sendCmd=useCallback(cmd=>{
    mq.publish(conn.topic+'/control',cmd.value);
    setLastSent(cmd.id);setTimeout(()=>setLastSent(null),250);
  },[mq,conn]);

  useEffect(()=>{
    const down=e=>{
      const key=e.code==='Space'?'Space':e.key;
      const cmd=cmds.find(c=>c.key===key||c.key===e.code);
      if(cmd){e.preventDefault();sendCmd(cmd);}
    };
    window.addEventListener('keydown',down);
    return()=>window.removeEventListener('keydown',down);
  },[cmds,sendCmd]);

  const dKeys=['ArrowUp','ArrowLeft','Space','ArrowRight','ArrowDown'];
  const dpad=Object.fromEntries(dKeys.map(k=>[k,cmds.find(c=>c.key===k)]));
  const extras=cmds.filter(c=>!dKeys.includes(c.key));

  const Btn=({cmd,w=72,h=60})=>{
    if(!cmd)return<div style={{width:w,height:h}}/>;
    const active=lastSent===cmd.id;
    return(
      <div style={{position:'relative'}}>
        <button onPointerDown={()=>sendCmd(cmd)} style={{
          width:w,height:h,borderRadius:t.radius,border:`2px solid ${active?cmd.color:t.border}`,
          background:active?`${cmd.color}20`:t.surface2,cursor:connected?'pointer':'not-allowed',
          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,
          transition:'all 0.1s',boxShadow:active?`0 0 0 3px ${cmd.color}30`:t.shadowSm,
          transform:active?'scale(0.93)':'scale(1)',opacity:connected?1:0.4,
          fontFamily:'Plus Jakarta Sans,sans-serif',userSelect:'none',touchAction:'none'
        }}>
          <span style={{fontSize:9,fontWeight:700,color:t.textSub,letterSpacing:'0.04em'}}>{cmd.label}</span>
          <span style={{fontSize:17,fontWeight:800,color:active?cmd.color:t.text,fontFamily:'monospace',lineHeight:1}}>{cmd.value}</span>
        </button>
        {editMode&&<button onClick={()=>setEditCmd({...cmd})} style={{position:'absolute',top:-6,right:-6,width:20,height:20,borderRadius:'50%',background:t.accent,border:'none',cursor:'pointer',padding:0,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="edit" size={10} color="#fff"/></button>}
      </div>
    );
  };

  return(
    <div style={{background:t.surface,borderRadius:t.radius,padding:20,border:`1px solid ${t.border}`,boxShadow:t.shadowSm}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:10,background:`${t.accent}15`,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="robot" size={15} color={t.accent}/>
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:t.text}}>Robot Commands</div>
            <div style={{fontSize:11,color:t.textMuted}}>{connected?`→ ${conn.topic}/control`:'Connect MQTT to send'}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>setEditMode(p=>!p)} style={{padding:'5px 11px',borderRadius:t.radius-4,border:`1px solid ${editMode?t.accent:t.border}`,background:editMode?`${t.accent}15`:t.surface2,color:editMode?t.accent:t.textSub,fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',display:'flex',alignItems:'center',gap:4}}>
            <Icon name="edit" size={11} color={editMode?t.accent:t.textSub}/>{editMode?'Done':'Edit'}
          </button>
          {editMode&&<button onClick={()=>{const nc={id:'c'+Date.now(),label:'CMD',value:'X',color:t.accent,key:''};setCmds(p=>[...p,nc]);setEditCmd(nc);}} style={{padding:'5px 11px',borderRadius:t.radius-4,border:`1px solid ${t.border}`,background:t.surface2,color:t.textSub,fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',display:'flex',alignItems:'center',gap:4}}><Icon name="plus" size={11}/>Add</button>}
        </div>
      </div>

      {/* D-pad */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,72px)',gridTemplateRows:'repeat(3,60px)',gap:8,justifyContent:'center',margin:'0 auto 12px'}}>
        <div/><Btn cmd={dpad['ArrowUp']}/><div/>
        <Btn cmd={dpad['ArrowLeft']}/><Btn cmd={dpad['Space']}/><Btn cmd={dpad['ArrowRight']}/>
        <div/><Btn cmd={dpad['ArrowDown']}/><div/>
      </div>

      {/* Extra buttons */}
      {extras.length>0&&(
        <div style={{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center',marginBottom:12}}>
          {extras.map(cmd=>(
            <div key={cmd.id} style={{position:'relative'}}>
              <button onPointerDown={()=>sendCmd(cmd)} style={{padding:'10px 16px',borderRadius:t.radius-4,border:`2px solid ${lastSent===cmd.id?cmd.color:t.border}`,background:lastSent===cmd.id?`${cmd.color}18`:t.surface2,cursor:connected?'pointer':'not-allowed',display:'flex',flexDirection:'column',alignItems:'center',gap:2,transition:'all 0.1s',opacity:connected?1:0.4,fontFamily:'Plus Jakarta Sans,sans-serif',touchAction:'none'}}>
                <span style={{fontSize:9,fontWeight:700,color:t.textSub,letterSpacing:'0.04em'}}>{cmd.label}</span>
                <span style={{fontSize:15,fontWeight:800,color:lastSent===cmd.id?cmd.color:t.text,fontFamily:'monospace'}}>{cmd.value}</span>
              </button>
              {editMode&&<button onClick={()=>setEditCmd({...cmd})} style={{position:'absolute',top:-6,right:-6,width:20,height:20,borderRadius:'50%',background:t.accent,border:'none',cursor:'pointer',padding:0,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="edit" size={10} color="#fff"/></button>}
            </div>
          ))}
        </div>
      )}

      <div style={{textAlign:'center',fontSize:11,color:t.textMuted}}>Arrow keys + Space · tap/click buttons</div>
      {editCmd&&<CmdEditModal theme={t} cmd={editCmd} onSave={u=>{setCmds(p=>p.map(c=>c.id===u.id?u:c));setEditCmd(null);}} onDelete={()=>{setCmds(p=>p.filter(c=>c.id!==editCmd.id));setEditCmd(null);}} onClose={()=>setEditCmd(null)}/>}
    </div>
  );
};

// ── MQTT LOG ──────────────────────────────────────────────────────────────────
const MQTTLog=({theme:t,messages})=>{
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[messages]);
  const col={tx:t.accent,rx:t.green,info:t.textSub,success:t.green,error:t.red};
  return(
    <div style={{background:t.surface,borderRadius:t.radius,border:`1px solid ${t.border}`,boxShadow:t.shadowSm,overflow:'hidden'}}>
      <div style={{padding:'12px 16px',borderBottom:`1px solid ${t.border}`,display:'flex',alignItems:'center',gap:7}}>
        <Icon name="activity" size={13} color={t.textSub}/>
        <span style={{fontSize:11,fontWeight:600,color:t.textSub}}>MQTT LOG</span>
        <span style={{marginLeft:'auto',fontSize:11,color:t.textMuted}}>{messages.length} msgs</span>
      </div>
      <div ref={ref} style={{height:150,overflowY:'auto',padding:12,background:t.surface2}}>
        {messages.length===0&&<div style={{fontSize:11,color:t.textMuted,textAlign:'center',paddingTop:20,fontFamily:'monospace'}}>No messages — connect to begin</div>}
        {messages.map((m,i)=>(
          <div key={i} style={{display:'flex',gap:10,padding:'2px 0',animation:'fadeIn 0.2s ease'}}>
            <span style={{fontSize:10,fontFamily:'monospace',color:t.textMuted,flexShrink:0}}>{m.time}</span>
            <span style={{fontSize:11,fontFamily:'monospace',color:col[m.type]||t.textSub,wordBreak:'break-all'}}>{m.text}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

  const[cmds,setCmds]=useState(()=>LS.get(`nx_cmds_${device.id}`,DEFAULT_ROBOT_CMDS));
  const[manCmd,setManCmd]=useState('');
  const[chartT]=useState(()=>genChart(device.temp||22,2));
  const[chartH]=useState(()=>genChart(device.humidity||55,5));
  const[liveT,setLiveT]=useState(device.temp);
  const[liveH,setLiveH]=useState(device.humidity);
  const isOnline=device.status==='online';

  // Persist conn + cmds
  useEffect(()=>LS.set(`nx_conn_${device.id}`,conn),[conn,device.id]);

    <div style={{flex:1,overflow:'auto',padding:'24px 28px'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>

            <StatusDot status={device.status} size={8}/>
          </div>
          <div style={{fontSize:11,color:t.textSub}}>{device.type} · fw {device.firmware}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
          <StatusDot status={mq.connState} size={8}/>
          <span style={{fontSize:11,fontWeight:600,color:{connected:t.green,connecting:t.amber,error:t.red,disconnected:t.textMuted}[mq.connState]}}>MQTT {mq.connState}</span>
        </div>
      </div>

      {!isOnline&&<div style={{background:`${t.red}12`,border:`1px solid ${t.red}30`,borderRadius:t.radius,padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:9}}><Icon name="zap" size={14} color={t.red}/><span style={{fontSize:12,color:t.red,fontWeight:500}}>Device offline · Last seen {device.lastSeen}</span></div>}

          <div style={{background:t.surface,borderRadius:t.radius,padding:18,border:`1px solid ${t.border}`,boxShadow:t.shadowSm}}>

            </div>
          </div>
        </div>

        <div style={{background:t.surface,borderRadius:t.radius,padding:18,border:`1px solid ${t.border}`,boxShadow:t.shadowSm}}>
          <div style={{fontSize:10,fontWeight:600,color:t.textSub,marginBottom:12}}>MANUAL COMMAND</div>
          <div style={{display:'flex',gap:7,marginBottom:10}}>

              <button key={qc} onClick={()=>mq.publish(conn.topic+'/control',qc)} disabled={mq.connState!=='connected'} style={{padding:'4px 10px',borderRadius:20,border:`1px solid ${t.border}`,background:'none',color:t.textSub,fontSize:10,fontWeight:700,cursor:mq.connState==='connected'?'pointer':'default',fontFamily:'Plus Jakarta Sans,sans-serif',opacity:mq.connState==='connected'?1:0.4}}>{qc}</button>

          </div>
        </div>

        {/* Log */}
        <div style={{gridColumn:'1/-1'}}><MQTTLog theme={t} messages={mq.messages}/></div>
      </div>
    </div>
  );
};

  };

  return(
    <div style={{flex:1,overflow:'auto',padding:'24px 28px'}}>
      {showAdd&&<AddDeviceModal theme={t} onAdd={handleAdd} onClose={()=>setShowAdd(false)}/>}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,color:t.text,letterSpacing:'-0.5px'}}>Dashboard</h1>
          <p style={{fontSize:13,color:t.textSub,marginTop:2}}>{online}/{devices.length} online</p>
        </div>
        <button onClick={()=>setShowAdd(true)} style={{display:'flex',alignItems:'center',gap:7,padding:'9px 16px',borderRadius:t.radius,border:'none',background:t.accent,color:'#fff',fontWeight:600,fontSize:13,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',boxShadow:`0 4px 14px ${t.accent}40`,whiteSpace:'nowrap'}}>
          <Icon name="plus" size={14} color="#fff"/>Add
        </button>
      </div>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:20}}>
        {[{l:'Online',v:online,c:t.green,i:'activity'},{l:'Offline',v:devices.length-online,c:t.red,i:'zap'},{l:'Total',v:devices.length,c:t.accent,i:'cpu'}].map(s=>(
          <div key={s.l} style={{background:t.surface,borderRadius:t.radius,padding:'14px 16px',border:`1px solid ${t.border}`,boxShadow:t.shadowSm}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
              <div style={{width:28,height:28,borderRadius:8,background:`${s.c}15`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon name={s.i} size={13} color={s.c}/>
              </div>
              <span style={{fontSize:11,color:t.textSub,fontWeight:600}}>{s.l}</span>
            </div>
            <div style={{fontSize:24,fontWeight:800,color:t.text}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Search */}
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:180,position:'relative'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…"
            style={{width:'100%',padding:'9px 13px 9px 34px',borderRadius:t.radius,border:`1.5px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,fontFamily:'Plus Jakarta Sans,sans-serif',outline:'none'}}/>
          <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:t.textMuted}}><Icon name="activity" size={13}/></div>
        </div>
        {['all','online','offline'].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{padding:'9px 13px',borderRadius:t.radius,border:`1.5px solid ${filter===f?t.accent:t.border}`,background:filter===f?`${t.accent}10`:t.surface,color:filter===f?t.accent:t.textSub,fontWeight:filter===f?600:400,fontSize:12,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',textTransform:'capitalize'}}>{f}</button>
        ))}
      </div>

      {/* Device grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:12}}>
        {filtered.map(d=>(
          <div key={d.id} onClick={()=>onSelect(d.id)}
            style={{background:t.surface,borderRadius:t.radius,padding:'18px 20px',border:`1px solid ${t.border}`,cursor:'pointer',transition:'all 0.2s',boxShadow:t.shadowSm,animation:'fadeUp 0.3s ease'}}
            onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow=t.shadow;}}
            onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow=t.shadowSm;}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
              <div style={{width:38,height:38,borderRadius:11,background:`${t.accent}15`,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name={d.type==='ESP32'?'wifi':'bluetooth'} size={16} color={t.accent}/></div>
              <div style={{display:'flex',alignItems:'center',gap:5,paddingTop:2}}>
                <StatusDot status={d.status}/>
                <span style={{fontSize:11,color:d.status==='online'?t.green:t.textMuted,fontWeight:500}}>{d.status}</span>
              </div>
            </div>
            <div style={{fontWeight:700,fontSize:14,color:t.text,marginBottom:3}}>{d.name}</div>
            <div style={{fontSize:11,color:t.textMuted}}>{d.type} · {d.lastSeen}</div>
            {d.temp&&<div style={{marginTop:10,fontSize:12,fontWeight:600,color:t.textSub}}>{d.temp}°C · {d.humidity}%</div>}
          </div>
        ))}
        {filtered.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:50,color:t.textMuted}}><Icon name="cpu" size={28} color={t.textMuted} style={{marginBottom:10}}/><div style={{fontSize:13}}>No devices found</div></div>}
      </div>
    </div>
  );
};

// ── APP SHELL ─────────────────────────────────────────────────────────────────
const AppShell=({theme:t,user,onLogout,tweaks,setTweaks})=>{
  const[page,setPage]=useState('dashboard');
  const[devices,setDevices]=useState(()=>LS.get('nx_devices',SAMPLE_DEVICES));
  const[selectedId,setSelectedId]=useState(null);
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const isMobile=window.innerWidth<768;

  // Persist devices
  useEffect(()=>LS.set('nx_devices',devices),[devices]);

  const updateDevice=(id,u)=>setDevices(p=>p.map(d=>d.id===id?{...d,...u}:d));
  const selected=devices.find(d=>d.id===selectedId);

  const nav=[{id:'dashboard',label:'Dashboard',icon:'cpu'},{id:'settings',label:'Settings',icon:'settings'}];

  const Sidebar=({mobile=false})=>(
    <div style={{
      width:mobile?'100%':220,height:'100vh',background:t.surface,
      borderRight:`1px solid ${t.border}`,display:'flex',flexDirection:'column',
      ...(mobile?{position:'fixed',inset:0,zIndex:200,animation:'slideIn 0.25s ease'}:{flexShrink:0})
    }}>
      {mobile&&<div onClick={()=>setSidebarOpen(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:-1}}/>}
      <div style={{padding:'20px 18px',borderBottom:`1px solid ${t.border}`,display:'flex',alignItems:'center',gap:10,justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:11,background:t.accent,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 4px 12px ${t.accent}45`}}>
            <Icon name="link" size={17} color="#fff"/>
          </div>
          <span style={{fontWeight:800,fontSize:15,color:t.text}}>NexaLink</span>
        </div>
        {mobile&&<button onClick={()=>setSidebarOpen(false)} style={{background:'none',border:'none',cursor:'pointer',color:t.textSub,padding:4}}><Icon name="x" size={18}/></button>}
      </div>
      <div style={{margin:'12px 12px 0',background:t.surface2,borderRadius:t.radius,padding:'10px 13px'}}>
        <div style={{fontSize:10,color:t.textMuted,fontWeight:600,marginBottom:3}}>DEVICES</div>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          <StatusDot status="online" size={7}/>
          <span style={{fontSize:13,fontWeight:600,color:t.text}}>{devices.filter(d=>d.status==='online').length} online</span>
          <span style={{fontSize:12,color:t.textMuted}}>/ {devices.length}</span>
        </div>
      </div>
      <nav style={{flex:1,padding:'10px 8px',display:'flex',flexDirection:'column',gap:2}}>
        {nav.map(item=>(
          <button key={item.id} onClick={()=>{setPage(item.id);setSelectedId(null);if(mobile)setSidebarOpen(false);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:t.radius-2,border:'none',cursor:'pointer',width:'100%',background:page===item.id&&!selectedId?`${t.accent}15`:'transparent',color:page===item.id&&!selectedId?t.accent:t.textSub,fontWeight:page===item.id&&!selectedId?600:400,fontSize:13,transition:'all 0.15s',fontFamily:'Plus Jakarta Sans,sans-serif'}}>
            <Icon name={item.icon} size={16} color={page===item.id&&!selectedId?t.accent:t.textSub}/>
            {item.label}
          </button>
        ))}
      </nav>
      <div style={{padding:'12px 16px',borderTop:`1px solid ${t.border}`,display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:30,height:30,borderRadius:'50%',background:`${t.accent}20`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <span style={{fontSize:12,fontWeight:700,color:t.accent}}>{user.name[0].toUpperCase()}</span>
        </div>
        <div style={{flex:1,overflow:'hidden'}}>
          <div style={{fontSize:12,fontWeight:600,color:t.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</div>
          <div style={{fontSize:11,color:t.textMuted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.email}</div>
        </div>
      </div>
    </div>
  );

  // Bottom tab bar for mobile
  const BottomNav=()=>(
    <div className="safe-bottom" style={{position:'fixed',bottom:0,left:0,right:0,background:t.surface,borderTop:`1px solid ${t.border}`,display:'flex',zIndex:100,backdropFilter:'blur(10px)'}}>
      {[...nav,{id:'menu',label:'Menu',icon:'menu'}].map(item=>{
        const active=item.id==='menu'?false:(page===item.id&&!selectedId);
        return(
          <button key={item.id} onClick={()=>item.id==='menu'?setSidebarOpen(true):(setPage(item.id),setSelectedId(null))} style={{flex:1,padding:'10px 0 8px',border:'none',background:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:3,cursor:'pointer',color:active?t.accent:t.textMuted}}>
            <Icon name={item.icon} size={20} color={active?t.accent:t.textMuted}/>
            <span style={{fontSize:9,fontWeight:active?700:500,fontFamily:'Plus Jakarta Sans,sans-serif'}}>{item.label}</span>
          </button>
        );
      })}
    </div>
  );

  const [isSmall,setIsSmall]=useState(()=>window.innerWidth<768);
  useEffect(()=>{const h=()=>setIsSmall(window.innerWidth<768);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);

  return(
    <div style={{display:'flex',height:'100vh',background:t.bg,overflow:'hidden'}}>
      {!isSmall&&<Sidebar/>}
      {isSmall&&sidebarOpen&&<Sidebar mobile/>}

      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        {/* Topbar */}
        <div style={{height:54,borderBottom:`1px solid ${t.border}`,background:t.surface,display:'flex',alignItems:'center',padding:'0 20px',gap:10,flexShrink:0}}>
          {isSmall&&(
            <button onClick={()=>setSidebarOpen(true)} style={{width:34,height:34,borderRadius:9,border:`1px solid ${t.border}`,background:t.surface2,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:t.textSub}}>
              <Icon name="menu" size={16}/>
            </button>
          )}
          <div style={{flex:1,fontWeight:700,fontSize:14,color:t.text}}>
            {selectedId&&selected?selected.name:page==='dashboard'?'Dashboard':'Settings'}
          </div>
          <button onClick={()=>setTweaks(p=>({...p,darkMode:!p.darkMode}))} style={{width:34,height:34,borderRadius:9,border:`1px solid ${t.border}`,background:t.surface2,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:t.textSub}}>
            <Icon name={t.dark?'sun':'moon'} size={14}/>
          </button>
        </div>

        {/* Content */}
        <div style={{flex:1,overflow:'hidden',display:'flex',paddingBottom:isSmall?56:0}}>
          {page==='dashboard'&&!selectedId&&<Dashboard theme={t} devices={devices} setDevices={setDevices} onSelect={id=>{setSelectedId(id);setPage('device');}}/>}
          {selectedId&&selected&&<DeviceView theme={t} device={selected} onUpdate={u=>updateDevice(selectedId,u)} onBack={()=>{setSelectedId(null);setPage('dashboard');}}/>}
          {page==='settings'&&!selectedId&&<SettingsPage theme={t} user={user} onLogout={onLogout} tweaks={tweaks} setTweaks={setTweaks}/>}
        </div>
      </div>

      {isSmall&&<BottomNav/>}

      <TweaksPanel>
        <TweakSection label="Appearance">
          <TweakToggle label="Dark Mode" value={tweaks.darkMode} onChange={v=>setTweaks(p=>({...p,darkMode:v}))}/>
          <TweakColor label="Accent Color" value={tweaks.accent} onChange={v=>setTweaks(p=>({...p,accent:v}))}/>
          <TweakSlider label="Border Radius" value={tweaks.radius} min={4} max={24} step={2} onChange={v=>setTweaks(p=>({...p,radius:v}))}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

// ── ROOT ──────────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS=/*EDITMODE-BEGIN*/{
  "accent": "#3B82F6",
  "radius": 14,
  "darkMode": false
}/*EDITMODE-END*/;

const App=()=>{
  const[tweaks,setTweaks]=useState(()=>({...TWEAK_DEFAULTS,...LS.get('nx_tweaks',{})}));
  const theme=makeTheme(tweaks.darkMode,tweaks.accent,tweaks.radius);
  const[user,setUser]=useState(()=>LS.get('nx_session',null));

  useEffect(()=>{
    LS.set('nx_tweaks',tweaks);
    document.querySelector('meta[name=theme-color]')?.setAttribute('content',tweaks.accent);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:tweaks},'*');
  },[tweaks]);

  const handleLogout=()=>{LS.set('nx_session',null);setUser(null);};

  if(!user)return<AuthScreen theme={theme} onLogin={u=>{LS.set('nx_session',u);setUser(u);}}/>;
  return<AppShell theme={theme} user={user} onLogout={handleLogout} tweaks={tweaks} setTweaks={setTweaks}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
