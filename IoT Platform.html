const MiniChart = ({ data, color, height=55, label }) => {
  if (!data||data.length<2) return null;
  const vals = data.map(d=>d.v);
  const min=Math.min(...vals), max=Math.max(...vals), range=max-min||1;
  const w=280, h=height;
  const pts = data.map((d,i)=>{
    const x=(i/(data.length-1))*w;
    const y=h-((d.v-min)/range)*(h-10)-5;
    return `${x},${y}`;
  });
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{display:'block'}}>
      <defs>
        <linearGradient id={`g${label}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={`M${pts[0]} L${pts.join(' L')} L${w},${h} L0,${h} Z`} fill={`url(#g${label})`}/>
      <path d={`M${pts.join(' L')}`} fill="none" stroke={color} strokeWidth="1.5"/>
    </svg>
  );
};

const genChart = (base, noise, n=20) => Array.from({length:n},(_,i)=>{
  const t=new Date(Date.now()-(n-1-i)*30000);
  return { t:`${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`, v:+(base+(Math.random()-0.5)*noise*2).toFixed(1) };
});

// ── useMQTT HOOK ───────────────────────────────────────────────────────────────
const useMQTT = () => {
  const [connState, setConnState] = useState('disconnected'); // disconnected|connecting|connected|error
  const [lastError, setLastError] = useState('');
  const [messages, setMessages] = useState([]);
  const clientRef = useRef(null);

  const addMsg = useCallback((msg) => {
    setMessages(p => [...p.slice(-99), { ...msg, time: new Date().toTimeString().slice(0,8) }]);
  }, []);

  const connect = useCallback((cfg) => {
    if (clientRef.current) {
      try { clientRef.current.end(true); } catch(e){}
      clientRef.current = null;
    }
    setConnState('connecting');
    setLastError('');
    addMsg({ type:'info', text:`Connecting to ${cfg.broker}:${cfg.port}…` });

    const protocol = cfg.useSSL ? 'wss' : 'ws';
    const url = `${protocol}://${cfg.broker}:${cfg.port}/mqtt`;

    const opts = {
      clientId: cfg.clientId || 'nexalink_' + Math.random().toString(36).slice(2,9),
      clean: true,
      connectTimeout: 8000,
      reconnectPeriod: 0,
    };
    if (cfg.username) opts.username = cfg.username;
    if (cfg.password) opts.password = cfg.password;

    let client;
    try {
      client = mqtt.connect(url, opts);
    } catch(e) {
      setConnState('error');
      setLastError(String(e));
      addMsg({ type:'error', text:`Failed: ${e}` });
      return;
    }

    client.on('connect', () => {
      setConnState('connected');
      addMsg({ type:'success', text:`Connected ✓ (${cfg.clientId})` });
      if (cfg.topic) client.subscribe(cfg.topic + '/#', ()=>{});
    });
    client.on('message', (topic, payload) => {
      addMsg({ type:'rx', text:`← [${topic}] ${payload.toString()}` });
    });
    client.on('error', (err) => {
      setConnState('error');
      setLastError(String(err));
      addMsg({ type:'error', text:`Error: ${err.message||err}` });
    });
    client.on('close', () => {
      setConnState('disconnected');
      addMsg({ type:'info', text:'Disconnected.' });
    });

    clientRef.current = client;
  }, [addMsg]);

  const disconnect = useCallback(() => {
    if (clientRef.current) {
      clientRef.current.end();
      clientRef.current = null;
    }
    setConnState('disconnected');
  }, []);

  const publish = useCallback((topic, payload) => {
    if (!clientRef.current || connState !== 'connected') return false;
    clientRef.current.publish(topic, String(payload));
    addMsg({ type:'tx', text:`→ [${topic}] ${payload}` });
    return true;
  }, [connState, addMsg]);

  useEffect(() => () => { if(clientRef.current) clientRef.current.end(true); }, []);

  return { connState, lastError, messages, connect, disconnect, publish, addMsg };
};

// ── ROBOT CONTROL PANEL ────────────────────────────────────────────────────────
const RobotControlPanel = ({ theme:t, mqtt:mq, conn, cmds, setCmds }) => {
  const [editMode, setEditMode] = useState(false);
  const [editCmd, setEditCmd] = useState(null); // { id, label, value, color }
  const [lastSent, setLastSent] = useState(null);
  const [pressedKey, setPressedKey] = useState(null);
  const connected = mq.connState === 'connected';

  const sendCmd = useCallback((cmd) => {
    const topic = conn.topic + '/control';
    const ok = mq.publish(topic, cmd.value);
    if (ok || true) {
      setLastSent(cmd.id);
      setTimeout(() => setLastSent(null), 300);
    }
  }, [mq, conn]);

  // Keyboard support
  useEffect(() => {
    const down = (e) => {
      const keyName = e.code === 'Space' ? 'Space' : e.key.replace('Arrow','Arrow');
      const cmd = cmds.find(c => c.key === keyName || c.key === e.code || c.key === e.key);
      if (cmd) {
        e.preventDefault();
        setPressedKey(cmd.id);
        sendCmd(cmd);
      }
    };
    const up = () => setPressedKey(null);
    window.addEventListener('keydown', down);
    window.addEventListener('keyup', up);
    return () => { window.removeEventListener('keydown', down); window.removeEventListener('keyup', up); };
  }, [cmds, sendCmd]);

  // D-pad layout: arrange by key
  const dpadMap = { ArrowUp:'top', ArrowDown:'bottom', ArrowLeft:'left', ArrowRight:'right', Space:'center' };
  const isDpad = cmds.some(c=>c.key==='ArrowUp');

  const addCmd = () => {
    const newCmd = { id:'c'+Date.now(), label:'CMD', value:'X', color:t.accent, key:'' };
    setCmds(p=>[...p, newCmd]);
    setEditCmd(newCmd);
  };

  const removeCmd = (id) => setCmds(p=>p.filter(c=>c.id!==id));
  const saveEdit = (updated) => {
    setCmds(p=>p.map(c=>c.id===updated.id?updated:c));
    setEditCmd(null);
  };

  const CmdButton = ({ cmd, style={} }) => {
    const active = pressedKey===cmd.id || lastSent===cmd.id;
    return (
      <div style={{position:'relative', ...style}}>
        <button
          onPointerDown={()=>sendCmd(cmd)}
          style={{
            width:'100%', height:'100%', borderRadius:t.radius,
            border:`2px solid ${active ? cmd.color : t.border}`,
            background: active ? `${cmd.color}22` : t.surface2,
            color:t.text, cursor:connected?'pointer':'not-allowed',
            display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
            gap:4, padding:'10px 8px', transition:'all 0.1s',
            boxShadow: active ? `0 0 0 4px ${cmd.color}30` : t.shadowSm,
            transform: active ? 'scale(0.96)' : 'scale(1)',
            opacity: connected ? 1 : 0.4,
            fontFamily:'Plus Jakarta Sans,sans-serif', userSelect:'none',
            minWidth:70, minHeight:60
          }}
        >
          <span style={{fontSize:11,fontWeight:700,color:t.textSub,letterSpacing:'0.05em'}}>{cmd.label}</span>
          <span style={{
            fontSize:18,fontWeight:800,color:active?cmd.color:t.text,
            fontFamily:'monospace', lineHeight:1
          }}>{cmd.value}</span>
          {cmd.key && <span style={{fontSize:9,color:t.textMuted,marginTop:2}}>{cmd.key.replace('Arrow','↑'.replace('Up','↑').replace('Down','↓').replace('Left','←').replace('Right','→'))}</span>}
        </button>
        {editMode && (
          <button onClick={()=>setEditCmd({...cmd})} style={{
            position:'absolute',top:-6,right:-6,width:20,height:20,borderRadius:'50%',
            background:t.accent,border:'none',cursor:'pointer',padding:0,
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:'0 2px 6px rgba(0,0,0,0.2)'
          }}><Icon name="edit" size={10} color="#fff"/></button>
        )}
      </div>
    );
  };

  return (
    <div style={{background:t.surface,borderRadius:t.radius,padding:22,border:`1px solid ${t.border}`,boxShadow:t.shadowSm}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:10,background:`${t.accent}15`,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="robot" size={16} color={t.accent}/>
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:t.text}}>Robot Commands</div>
            <div style={{fontSize:11,color:t.textMuted}}>
              {connected ? `→ ${conn.topic}/control` : 'Connect MQTT to send'}
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>setEditMode(p=>!p)} style={{
            padding:'6px 12px', borderRadius:t.radius-4, border:`1px solid ${editMode?t.accent:t.border}`,
            background: editMode?`${t.accent}15`:t.surface2, color:editMode?t.accent:t.textSub,
            fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',
            display:'flex',alignItems:'center',gap:5
          }}>
            <Icon name="edit" size={12} color={editMode?t.accent:t.textSub}/>
            {editMode ? 'Done' : 'Edit'}
          </button>
          {editMode && (
            <button onClick={addCmd} style={{
              padding:'6px 12px',borderRadius:t.radius-4,border:`1px solid ${t.border}`,
              background:t.surface2,color:t.textSub,fontSize:11,fontWeight:600,
              cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',
              display:'flex',alignItems:'center',gap:5
            }}>
              <Icon name="plus" size={12}/>Add
            </button>
          )}
        </div>
      </div>

      {/* D-Pad layout */}
      <div style={{
        display:'grid',
        gridTemplateColumns:'repeat(3,72px)',
        gridTemplateRows:'repeat(3,60px)',
        gap:8, justifyContent:'center', margin:'0 auto 14px'
      }}>
        {/* Row 1 */}
        <div/>
        {cmds.find(c=>c.key==='ArrowUp') && <CmdButton cmd={cmds.find(c=>c.key==='ArrowUp')}/>}
        <div/>
        {/* Row 2 */}
        {cmds.find(c=>c.key==='ArrowLeft') && <CmdButton cmd={cmds.find(c=>c.key==='ArrowLeft')}/>}
        {cmds.find(c=>c.key==='Space') && <CmdButton cmd={cmds.find(c=>c.key==='Space')}/>}
        {cmds.find(c=>c.key==='ArrowRight') && <CmdButton cmd={cmds.find(c=>c.key==='ArrowRight')}/>}
        {/* Row 3 */}
        <div/>
        {cmds.find(c=>c.key==='ArrowDown') && <CmdButton cmd={cmds.find(c=>c.key==='ArrowDown')}/>}
        <div/>
      </div>

      {/* Extra commands (no key or custom) */}
      {cmds.filter(c=>!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(c.key)).length > 0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center',marginBottom:14}}>
          {cmds.filter(c=>!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(c.key)).map(cmd=>(
            <div key={cmd.id} style={{position:'relative'}}>
              <button onPointerDown={()=>sendCmd(cmd)} style={{
                padding:'10px 18px', borderRadius:t.radius-4,
                border:`2px solid ${lastSent===cmd.id?cmd.color:t.border}`,
                background:lastSent===cmd.id?`${cmd.color}18`:t.surface2,
                color:t.text,cursor:connected?'pointer':'not-allowed',
                display:'flex',flexDirection:'column',alignItems:'center',gap:2,
                transition:'all 0.1s', transform:lastSent===cmd.id?'scale(0.95)':'scale(1)',
                opacity:connected?1:0.4, fontFamily:'Plus Jakarta Sans,sans-serif'
              }}>
                <span style={{fontSize:10,fontWeight:700,color:t.textSub,letterSpacing:'0.05em'}}>{cmd.label}</span>
                <span style={{fontSize:16,fontWeight:800,color:lastSent===cmd.id?cmd.color:t.text,fontFamily:'monospace'}}>{cmd.value}</span>
              </button>
              {editMode && (
                <button onClick={()=>setEditCmd({...cmd})} style={{
                  position:'absolute',top:-6,right:-6,width:20,height:20,borderRadius:'50%',
                  background:t.accent,border:'none',cursor:'pointer',padding:0,
                  display:'flex',alignItems:'center',justifyContent:'center'
                }}><Icon name="edit" size={10} color="#fff"/></button>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Keyboard hint */}
      <div style={{textAlign:'center',fontSize:11,color:t.textMuted}}>
        Use arrow keys + spacebar · tap/click buttons · hold for continuous
      </div>

      {/* Edit modal */}
      {editCmd && (
        <CmdEditModal theme={t} cmd={editCmd} onSave={saveEdit}
          onDelete={()=>{removeCmd(editCmd.id);setEditCmd(null);}}
          onClose={()=>setEditCmd(null)}/>
      )}
    </div>
  );
};

const MQTTLog = ({ theme:t, messages }) => {

    if (ref.current) ref.current.scrollTop = ref.current.scrollHeight;
  }, [messages]);

  const color = { tx:t.accent, rx:t.green, info:t.textSub, success:t.green, error:t.red };

  return (
    <div style={{background:t.surface,borderRadius:t.radius,border:`1px solid ${t.border}`,boxShadow:t.shadowSm,overflow:'hidden'}}>
      <div style={{padding:'14px 18px',borderBottom:`1px solid ${t.border}`,display:'flex',alignItems:'center',gap:8}}>

        <span style={{fontSize:12,fontWeight:600,color:t.textSub}}>MQTT LOG</span>

            <span style={{fontSize:11,fontFamily:'monospace',color:color[m.type]||t.textSub,wordBreak:'break-all'}}>{m.text}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── ADD DEVICE MODAL ───────────────────────────────────────────────────────────
const AddDeviceModal = ({ theme:t, onAdd, onClose }) => {
  const [name,setName]=useState('');
  const [type,setType]=useState('ESP32');
  const [step,setStep]=useState(1);
  const [loading,setLoading]=useState(false);
  const topicId = useRef('d'+Math.random().toString(36).slice(2,7));

  const handleAdd = () => {
    if(!name)return;
    setLoading(true);
    setTimeout(()=>{ onAdd({name,type}); setLoading(false); },900);
  };

  const inp = { style:{
    width:'100%',padding:'10px 13px',borderRadius:t.radius-2,
    border:`1.5px solid ${t.border}`,background:t.surface2,
    color:t.text,fontSize:13,fontFamily:'Plus Jakarta Sans,sans-serif',outline:'none'
  }};

  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',
      alignItems:'center',justifyContent:'center',zIndex:1000,backdropFilter:'blur(4px)'}}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:t.surface,borderRadius:t.radius+4,padding:30,width:420,
        border:`1px solid ${t.border}`,boxShadow:t.shadow,animation:'slideUp 0.3s ease'
      }}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
          <div style={{fontSize:17,fontWeight:700,color:t.text}}>Add New Device</div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:t.textSub}}>
            <Icon name="x" size={20}/>
          </button>
        </div>
        {step===1&&(
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div>
              <label style={{fontSize:11,fontWeight:600,color:t.textSub,display:'block',marginBottom:5}}>DEVICE NAME</label>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Robot Arm" {...inp} autoFocus/>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:600,color:t.textSub,display:'block',marginBottom:8}}>DEVICE TYPE</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                {[{id:'ESP32',icon:'wifi',desc:'WiFi / MQTT direct'},{id:'HC-05',icon:'bluetooth',desc:'Via bridge client'}].map(dt=>(
                  <button key={dt.id} onClick={()=>setType(dt.id)} style={{
                    padding:'13px 12px',borderRadius:t.radius,border:`2px solid ${type===dt.id?t.accent:t.border}`,
                    background:type===dt.id?`${t.accent}10`:t.surface2,cursor:'pointer',textAlign:'left',
                    transition:'all 0.15s',fontFamily:'Plus Jakarta Sans,sans-serif'
                  }}>
                    <Icon name={dt.icon} size={18} color={type===dt.id?t.accent:t.textSub}/>
                    <div style={{fontWeight:700,fontSize:13,color:type===dt.id?t.accent:t.text,marginTop:7}}>{dt.id}</div>
                    <div style={{fontSize:11,color:t.textMuted,marginTop:2}}>{dt.desc}</div>
                  </button>
                ))}
              </div>
            </div>
            <button onClick={()=>name&&setStep(2)} style={{
              padding:'11px 0',borderRadius:t.radius-2,border:'none',
              background:name?t.accent:t.surface2,color:name?'#fff':t.textMuted,
              fontWeight:600,fontSize:14,cursor:name?'pointer':'default',
              fontFamily:'Plus Jakarta Sans,sans-serif',marginTop:2
            }}>Continue →</button>
          </div>
        )}
        {step===2&&(
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div style={{background:t.surface2,borderRadius:t.radius,padding:16,border:`1px solid ${t.border}`}}>
              <div style={{fontSize:11,fontWeight:600,color:t.textMuted,marginBottom:8}}>MQTT CREDENTIALS</div>
              <div style={{fontFamily:'monospace',fontSize:12,color:t.textSub,lineHeight:2}}>
                <div>Broker: <span style={{color:t.accent}}>broker.hivemq.com</span></div>
                <div>Port WSS: <span style={{color:t.accent}}>8884</span></div>
                <div>Topic: <span style={{color:t.accent}}>nexalink/device/{topicId.current}</span></div>
              </div>
            </div>
            {type==='HC-05'&&(
              <div style={{background:`${t.amber}15`,borderRadius:t.radius,padding:13,border:`1px solid ${t.amber}30`}}>
                <div style={{fontSize:12,fontWeight:700,color:t.amber}}>Bridge Required</div>
                <div style={{fontSize:12,color:t.textSub,marginTop:3}}>HC-05 needs a bridge client to forward Bluetooth → MQTT.</div>
              </div>
            )}
            <button onClick={handleAdd} disabled={loading} style={{
              padding:'11px 0',borderRadius:t.radius-2,border:'none',background:t.accent,
              color:'#fff',fontWeight:600,fontSize:14,cursor:loading?'wait':'pointer',
              fontFamily:'Plus Jakarta Sans,sans-serif',boxShadow:`0 4px 12px ${t.accent}40`
            }}>{loading?'Registering…':'Register Device'}</button>
          </div>
        )}
      </div>
    </div>
  );
};

// ── DASHBOARD ──────────────────────────────────────────────────────────────────
const Dashboard = ({ theme:t, devices, setDevices, onSelectDevice }) => {
  const [showAdd,setShowAdd]=useState(false);
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('all');

  const filtered = devices.filter(d=>{
    return d.name.toLowerCase().includes(search.toLowerCase()) && (filter==='all'||d.status===filter);
  });
  const online = devices.filter(d=>d.status==='online').length;

  const handleAdd = ({name,type}) => {
    setDevices(p=>[...p,{
      id:'d'+Date.now(),name,type,status:'online',lastSeen:'Just now',
      sharedWith:[],permission:'owner',firmware:type==='ESP32'?'v2.3.1':'v1.0.4',
      temp:type==='ESP32'?22.0:null,humidity:type==='ESP32'?50:null,brightness:50,relay:false
    }]);
    setShowAdd(false);
  };

  return (
    <div style={{flex:1,overflow:'auto',padding:'30px 34px'}}>
      {showAdd&&<AddDeviceModal theme={t} onAdd={handleAdd} onClose={()=>setShowAdd(false)}/>}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:26}}>
        <div>
          <h1 style={{fontSize:24,fontWeight:800,color:t.text,letterSpacing:'-0.5px'}}>Dashboard</h1>
          <p style={{fontSize:13,color:t.textSub,marginTop:2}}>{online} of {devices.length} devices online</p>
        </div>
        <button onClick={()=>setShowAdd(true)} style={{
          display:'flex',alignItems:'center',gap:7,padding:'10px 18px',borderRadius:t.radius,
          border:'none',background:t.accent,color:'#fff',fontWeight:600,fontSize:13,
          cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',boxShadow:`0 4px 14px ${t.accent}40`
        }}>
          <Icon name="plus" size={15} color="#fff"/>Add Device
        </button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:24}}>
        {[
          {label:'Online',val:online,icon:'activity',color:t.green},
          {label:'Offline',val:devices.length-online,icon:'zap',color:t.red},
          {label:'Shared',val:devices.filter(d=>d.sharedWith.length>0).length,icon:'users',color:t.accent},
        ].map(s=>(
          <div key={s.label} style={{background:t.surface,borderRadius:t.radius,padding:'16px 18px',border:`1px solid ${t.border}`,boxShadow:t.shadowSm}}>
            <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:8}}>
              <div style={{width:30,height:30,borderRadius:9,background:`${s.color}15`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon name={s.icon} size={14} color={s.color}/>
              </div>
              <span style={{fontSize:12,color:t.textSub,fontWeight:600}}>{s.label}</span>
            </div>
            <div style={{fontSize:26,fontWeight:800,color:t.text}}>{s.val}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:9,marginBottom:18}}>
        <div style={{flex:1,position:'relative'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search devices…"
            style={{width:'100%',padding:'9px 14px 9px 36px',borderRadius:t.radius,border:`1.5px solid ${t.border}`,
              background:t.surface,color:t.text,fontSize:13,fontFamily:'Plus Jakarta Sans,sans-serif',outline:'none'}}/>
          <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:t.textMuted}}>
            <Icon name="activity" size={14}/>
          </div>
        </div>
        {['all','online','offline'].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{
            padding:'9px 15px',borderRadius:t.radius,border:`1.5px solid ${filter===f?t.accent:t.border}`,
            background:filter===f?`${t.accent}10`:t.surface,color:filter===f?t.accent:t.textSub,
            fontWeight:filter===f?600:400,fontSize:12,cursor:'pointer',
            fontFamily:'Plus Jakarta Sans,sans-serif',transition:'all 0.15s',textTransform:'capitalize'
          }}>{f}</button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:13}}>
        {filtered.map(d=><DeviceCard key={d.id} theme={t} device={d} onClick={()=>onSelectDevice(d.id)}/>)}

          <div style={{gridColumn:'1/-1',textAlign:'center',padding:60,color:t.textMuted}}>
            <Icon name="cpu" size={30} color={t.textMuted} style={{marginBottom:10}}/>

          </div>
        )}
      </div>
    </div>
  );

// ── DEVICE VIEW ────────────────────────────────────────────────────────────────
const DeviceView = ({ theme:t, device, onUpdate, onBack }) => {
  const mq = useMQTT();
  const [conn, setConn] = useState({...DEFAULT_CONN, topic:`nexalink/device/${device.id}`});
  const [cmds, setCmds] = useState(DEFAULT_ROBOT_CMDS);
  const [manualCmd, setManualCmd] = useState('');
  const [chartTemp] = useState(()=>genChart(device.temp||22,2));
  const [chartHum] = useState(()=>genChart(device.humidity||55,5));
  const [liveTemp, setLiveTemp] = useState(device.temp);
  const [liveHum, setLiveHum] = useState(device.humidity);
  const isOnline = device.status === 'online';

  useEffect(()=>{
    if(!isOnline)return;
    const iv=setInterval(()=>{
      setLiveTemp(p=>p!==null?+(p+(Math.random()-0.5)*0.3).toFixed(1):null);
      setLiveHum(p=>p!==null?Math.max(20,Math.min(95,+(p+(Math.random()-0.5)*0.8).toFixed(0))):null);
    },2500);
    return ()=>clearInterval(iv);
  },[isOnline]);

  const sendManual = () => {
    if(!manualCmd.trim())return;
    mq.publish(conn.topic+'/control', manualCmd);
    setManualCmd('');
  };

  return (
    <div style={{flex:1,overflow:'auto',padding:'30px 34px'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
        <button onClick={onBack} style={{width:36,height:36,borderRadius:t.radius,border:`1px solid ${t.border}`,
          background:t.surface,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:t.textSub,flexShrink:0}}>
          <Icon name="chevronLeft" size={18}/>
        </button>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <h1 style={{fontSize:20,fontWeight:800,color:t.text,letterSpacing:'-0.4px'}}>{device.name}</h1>
            <StatusDot status={device.status} size={8}/>
          </div>
          <div style={{fontSize:12,color:t.textSub,marginTop:1}}>{device.type} · fw {device.firmware}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <StatusDot status={mq.connState} size={9}/>
          <span style={{fontSize:12,fontWeight:600,color:
            {connected:t.green,connecting:t.amber,error:t.red,disconnected:t.textMuted}[mq.connState]}}>
            MQTT: {mq.connState}
          </span>
        </div>
      </div>

      {!isOnline&&(
        <div style={{background:`${t.red}12`,border:`1px solid ${t.red}30`,borderRadius:t.radius,
          padding:'13px 17px',marginBottom:18,display:'flex',alignItems:'center',gap:10}}>
          <Icon name="zap" size={15} color={t.red}/>
          <span style={{fontSize:13,color:t.red,fontWeight:500}}>Device offline · Last seen {device.lastSeen} · Controls disabled</span>
        </div>
      )}

      {/* Connection panel */}
      <ConnectionPanel theme={t} mqtt={mq} conn={conn} setConn={setConn}/>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        {/* Robot control - full width */}
        <div style={{gridColumn:'1/-1'}}>
          <RobotControlPanel theme={t} mqtt={mq} conn={conn} cmds={cmds} setCmds={setCmds}/>
        </div>

        {/* Temp */}
        {liveTemp!==null&&(
          <div style={{background:t.surface,borderRadius:t.radius,padding:20,border:`1px solid ${t.border}`,boxShadow:t.shadowSm}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
              <div style={{display:'flex',alignItems:'center',gap:7,color:t.textSub}}>
                <Icon name="thermometer" size={13}/>
                <span style={{fontSize:11,fontWeight:600}}>TEMPERATURE</span>
              </div>
              {isOnline&&<div style={{width:6,height:6,borderRadius:'50%',background:t.green,animation:'pulse 2s infinite'}}/>}
            </div>
            <div style={{fontSize:34,fontWeight:800,color:t.text,letterSpacing:'-1px',margin:'8px 0'}}>{liveTemp}°C</div>
            <MiniChart data={chartTemp} color={t.accent} height={50} label="temp"/>
          </div>
        )}

        {/* Humidity */}
        {liveHum!==null&&(
          <div style={{background:t.surface,borderRadius:t.radius,padding:20,border:`1px solid ${t.border}`,boxShadow:t.shadowSm}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
              <div style={{display:'flex',alignItems:'center',gap:7,color:t.textSub}}>
                <Icon name="droplets" size={13}/>
                <span style={{fontSize:11,fontWeight:600}}>HUMIDITY</span>
              </div>
              {isOnline&&<div style={{width:6,height:6,borderRadius:'50%',background:t.green,animation:'pulse 2s infinite'}}/>}
            </div>
            <div style={{fontSize:34,fontWeight:800,color:t.text,letterSpacing:'-1px',margin:'8px 0'}}>{liveHum}%</div>
            <MiniChart data={chartHum} color='#22c55e' height={50} label="hum"/>
          </div>
        )}

        {/* Controls */}
        <div style={{background:t.surface,borderRadius:t.radius,padding:20,border:`1px solid ${t.border}`,boxShadow:t.shadowSm}}>
          <div style={{fontSize:11,fontWeight:600,color:t.textSub,marginBottom:16}}>DEVICE CONTROLS</div>
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:t.text}}>Main Relay</div>
                <div style={{fontSize:11,color:t.textMuted,fontFamily:'monospace'}}>{conn.topic}/relay</div>
              </div>
              <Toggle checked={device.relay} accent={t.accent} disabled={!isOnline||device.permission==='viewer'}
                onChange={v=>{onUpdate({relay:v});mq.publish(conn.topic+'/relay',v?'1':'0');}}/>
            </div>
            <div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:t.text}}>Brightness</div>
                  <div style={{fontSize:11,color:t.textMuted,fontFamily:'monospace'}}>{conn.topic}/brightness</div>
                </div>
                <span style={{fontSize:13,fontWeight:700,color:t.accent}}>{device.brightness}%</span>
              </div>
              <div style={{position:'relative',height:5,background:t.surface2,borderRadius:10}}>
                <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${device.brightness}%`,background:t.accent,borderRadius:10,transition:'width 0.1s'}}/>
                <input type="range" min={0} max={100} value={device.brightness}
                  disabled={!isOnline||device.permission==='viewer'}
                  onChange={e=>{onUpdate({brightness:+e.target.value});mq.publish(conn.topic+'/brightness',e.target.value);}}
                  style={{position:'absolute',inset:0,opacity:0,cursor:(isOnline&&device.permission!=='viewer')?'pointer':'not-allowed',width:'100%',height:'100%'}}/>
              </div>
            </div>
          </div>
        </div>

        {/* Manual command */}
        <div style={{background:t.surface,borderRadius:t.radius,padding:20,border:`1px solid ${t.border}`,boxShadow:t.shadowSm}}>
          <div style={{fontSize:11,fontWeight:600,color:t.textSub,marginBottom:14}}>SEND COMMAND</div>
          <div style={{display:'flex',gap:7,marginBottom:12}}>
            <input value={manualCmd} onChange={e=>setManualCmd(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&sendManual()}
              placeholder={mq.connState==='connected'?'Any payload…':'Connect MQTT first'}
              disabled={mq.connState!=='connected'}
              style={{flex:1,padding:'9px 13px',borderRadius:t.radius-4,border:`1.5px solid ${t.border}`,
                background:t.surface2,color:t.text,fontSize:13,fontFamily:'monospace',outline:'none',
                opacity:mq.connState==='connected'?1:0.5}}/>
            <button onClick={sendManual} disabled={mq.connState!=='connected'||!manualCmd} style={{
              padding:'9px 13px',borderRadius:t.radius-4,border:'none',
              background:(mq.connState==='connected'&&manualCmd)?t.accent:t.surface2,
              color:(mq.connState==='connected'&&manualCmd)?'#fff':t.textMuted,
              cursor:(mq.connState==='connected'&&manualCmd)?'pointer':'default',transition:'all 0.15s'
            }}>
              <Icon name="send" size={15} color={(mq.connState==='connected'&&manualCmd)?'#fff':t.textMuted}/>
            </button>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {['REBOOT','STATUS','RESET','PING'].map(qc=>(
              <button key={qc} onClick={()=>mq.publish(conn.topic+'/control',qc)}
                disabled={mq.connState!=='connected'}
                style={{padding:'4px 11px',borderRadius:20,border:`1px solid ${t.border}`,background:'none',
                  color:t.textSub,fontSize:11,fontWeight:600,cursor:mq.connState==='connected'?'pointer':'default',
                  fontFamily:'Plus Jakarta Sans,sans-serif',opacity:mq.connState==='connected'?1:0.4}}>
                {qc}
              </button>
            ))}
          </div>
        </div>

        {/* MQTT Log - full width */}
        <div style={{gridColumn:'1/-1'}}>
          <MQTTLog theme={t} messages={mq.messages}/>
        </div>
      </div>
    </div>
  );
};

// ── APP SHELL ──────────────────────────────────────────────────────────────────
const AppShell = ({ theme:t, user, onLogout, tweaks, setTweaks }) => {
  const [page,setPage]=useState('dashboard');
  const [devices,setDevices]=useState(INITIAL_DEVICES);
  const [selectedId,setSelectedId]=useState(null);
  const [collapsed,setCollapsed]=useState(false);

  const selected = devices.find(d=>d.id===selectedId);
  const updateDevice = (id,u) => setDevices(p=>p.map(d=>d.id===id?{...d,...u}:d));

  return (
    <div style={{display:'flex',height:'100vh',background:t.bg,overflow:'hidden'}}>
      <Sidebar theme={t} user={user} page={page}
        setPage={p=>{setPage(p);setSelectedId(null);}}
        devices={devices} onLogout={onLogout}
        collapsed={collapsed} setCollapsed={setCollapsed}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        {/* Topbar */}
        <div style={{height:54,borderBottom:`1px solid ${t.border}`,background:t.surface,
          display:'flex',alignItems:'center',justifyContent:'flex-end',padding:'0 26px',gap:10,flexShrink:0}}>
          <button onClick={()=>setTweaks(p=>({...p,darkMode:!p.darkMode}))} style={{
            width:33,height:33,borderRadius:9,border:`1px solid ${t.border}`,
            background:t.surface2,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:t.textSub
          }}><Icon name={t.dark?'sun':'moon'} size={14}/></button>
          <button style={{width:33,height:33,borderRadius:9,border:`1px solid ${t.border}`,
            background:t.surface2,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:t.textSub,position:'relative'}}>
            <Icon name="bell" size={14}/>
            <span style={{position:'absolute',top:6,right:6,width:6,height:6,borderRadius:'50%',background:t.accent,border:`2px solid ${t.surface}`}}/>
          </button>
        </div>
        {/* Content */}
        {page==='dashboard'&&<Dashboard theme={t} devices={devices} setDevices={setDevices} onSelectDevice={id=>{setSelectedId(id);setPage('device');}}/>}
        {page==='device'&&selected&&<DeviceView theme={t} device={selected} onUpdate={u=>updateDevice(selectedId,u)} onBack={()=>{setSelectedId(null);setPage('dashboard');}}/>}
        {page==='logs'&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:t.textMuted,gap:12}}><Icon name="log" size={36} color={t.textMuted}/><div style={{fontSize:16,fontWeight:700,color:t.textSub}}>Device Logs</div><div style={{fontSize:13}}>Coming soon</div></div>}
        {page==='users'&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:t.textMuted,gap:12}}><Icon name="users" size={36} color={t.textMuted}/><div style={{fontSize:16,fontWeight:700,color:t.textSub}}>Shared Access</div><div style={{fontSize:13}}>Coming soon</div></div>}
        {page==='settings'&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:t.textMuted,gap:12}}><Icon name="settings" size={36} color={t.textMuted}/><div style={{fontSize:16,fontWeight:700,color:t.textSub}}>Settings</div><div style={{fontSize:13}}>Coming soon</div></div>}
      </div>
      <TweaksPanel>
        <TweakSection label="Appearance">
          <TweakToggle label="Dark Mode" value={tweaks.darkMode} onChange={v=>setTweaks(p=>({...p,darkMode:v}))}/>
          <TweakColor label="Accent Color" value={tweaks.accent} onChange={v=>setTweaks(p=>({...p,accent:v}))}/>
          <TweakSlider label="Border Radius" value={tweaks.radius} min={4} max={24} step={2} onChange={v=>setTweaks(p=>({...p,radius:v}))}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

// ── ROOT ───────────────────────────────────────────────────────────────────────
const App = () => {
  const defaults = (() => { try{return JSON.parse(document.getElementById('__tweak_defaults').textContent);}catch{return{};} })();
  const [tweaks,setTweaks] = useState(defaults);
  const theme = makeTheme(tweaks.darkMode, tweaks.accent, tweaks.radius);
  const [user,setUser] = useState(null);

  useEffect(()=>{
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:tweaks},'*');
    const el=document.getElementById('__tweak_defaults');
    if(el) el.textContent=JSON.stringify(tweaks,null,2);
  },[tweaks]);

  if(!user) return <AuthScreen theme={theme} onLogin={setUser}/>;
  return <AppShell theme={theme} user={user} onLogout={()=>setUser(null)} tweaks={tweaks} setTweaks={setTweaks}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
